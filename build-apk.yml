name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-venv \
            build-essential \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libglib2.0-0 \
            libsm6 \
            libxrender1 \
            libxext6 \
            openjdk-17-jdk \
            zip \
            ant \
            wget \
            unzip \
            autoconf \
            libltdl-dev \
            libtool \
            pkg-config

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create mobile_app folder
        run: |
          mkdir mobile_app
          mv mobile_app.py mobile_app/
          mv buildozer.spec mobile_app/

      - name: Install Buildozer & Dependencies
        working-directory: mobile_app
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.33
          pip install numpy==1.24.3
          pip install kivy==2.3.0
          pip install plyer

      - name: Build APK
        working-directory: mobile_app
        timeout-minutes: 20
        env:
          ANDROID_HOME: ${{ runner.tool_cache }}/android-sdk
          ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk
        run: |
          source venv/bin/activate
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: controller-app-apk
          path: mobile_app/bin/*.apk

      - name: List bin directory (debug)
        if: failure()
        working-directory: mobile_app
        run: |
          ls -la bin/ || echo "bin directory not found"
          ls -la || echo "Directory listing failed"
