name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Update package lists
        run: sudo apt-get update

      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            python3-pip \
            python3-venv \
            build-essential \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libglib2.0-0 \
            libsm6 \
            libxrender1 \
            libxext6 \
            openjdk-17-jdk \
            zip \
            ant

      - name: Set up Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_HOME
          
          # Download Android command line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O android-tools.zip
          unzip -q android-tools.zip -d $ANDROID_HOME
          rm android-tools.zip
          
          # Accept all licenses
          yes | $ANDROID_HOME/cmdline-tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          
          # Install required packages
          $ANDROID_HOME/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Create mobile_app folder
        run: |
          mkdir mobile_app
          mv mobile_app.py mobile_app/
          mv buildozer.spec mobile_app/

      - name: Install Buildozer
        working-directory: mobile_app
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.33
          pip install numpy==1.24.3

      - name: Set Android Environment
        working-directory: mobile_app
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Build APK
        working-directory: mobile_app
        run: |
          source venv/bin/activate
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: controller-apk
          path: mobile_app/bin/*.apk
